name: Daily Dining Chair Search

on:
  schedule:
    # Run every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  search:
    name: Search for 12-Chair Sets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check API key configuration
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
        run: |
          python -c "
          import os
          serp = os.environ.get('SERP_API_KEY', '')
          ebay = os.environ.get('EBAY_APP_ID', '')
          print('=== API KEY STATUS ===')
          print(f'SERP_API_KEY : {\"SET (\" + str(len(serp)) + \" chars)\" if serp else \"NOT SET - SerpAPI scrapers will be skipped\"}')
          print(f'EBAY_APP_ID  : {\"SET (\" + str(len(ebay)) + \" chars)\" if ebay else \"NOT SET - eBay Finding API will be skipped\"}')
          print('=====================')
          if not serp and not ebay:
              print()
              print('ACTION REQUIRED: No API keys are configured.')
              print('Go to: Settings > Secrets and variables > Actions')
              print('Add SERP_API_KEY (from serpapi.com) and/or EBAY_APP_ID (from developer.ebay.com)')
          "

      - name: Run chair search
        env:
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          PYTHONUNBUFFERED: '1'
        run: |
          python run_scraper.py

      - name: Show results summary
        run: |
          python -c "
          import json, os, sys
          path = 'data/results.json'
          if not os.path.exists(path):
              print('No results file found.')
              sys.exit(0)
          with open(path) as f:
              data = json.load(f)
          s = data.get('search_stats', {})
          print(f\"Total listings : {s.get('total', 0)}\")
          print(f\"USA listings   : {s.get('usa_count', 0)}\")
          print(f\"International  : {s.get('intl_count', 0)}\")
          print(f\"Platforms      : {', '.join(s.get('sources', []))}\")
          avg = s.get('avg_price', 0)
          if avg:
              print(f\"Avg price      : \${avg:,.0f}\")
          "

      - name: Commit updated results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/results.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily search update $(date +'%Y-%m-%d')"
            git push origin HEAD
          fi
